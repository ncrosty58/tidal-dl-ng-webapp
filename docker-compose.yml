services:
  tidal-dl:
    build: .
    image: tidal-dl:latest
    container_name: tidal-dl
    restart: always
    ports:
      - "5050:5050"
    # Secrets (DOWNLOAD_TOKEN) are injected at runtime from a local .env file
    # (gitignored) rather than being baked into the image.
    env_file:
      - .env
    environment:
      - TZ=America/Detroit
      - DOWNLOAD_TIMEOUT=0
    volumes:
      # Persists tidal-dl-ng's login session (token.json) and settings
      # (settings.json) across container recreation/updates, so you don't
      # have to run `tidal-dl-ng login` again.
      - tidal_dl_config:/home/app/.config/tidal_dl_ng
      # Where downloads actually land. Point this at wherever your music
      # library lives; download_base_path in settings.json is set to
      # /downloads to match.
      - /mnt/prox_host/media/music:/downloads

volumes:
  tidal_dl_config:
